<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>战绩记录器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        accent: '#8b5cf6',
                        neutral: '#6b7280',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .glass {
                @apply bg-white/80 backdrop-blur-md border border-white/20;
            }
            .card {
                @apply glass rounded-lg shadow-lg p-6 transition-all duration-300 hover:shadow-xl;
            }
            .btn {
                @apply px-4 py-2 rounded-md font-medium transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2;
            }
            .btn-primary {
                @apply btn bg-primary text-white hover:bg-primary/90 focus:ring-primary/50;
            }
            .btn-secondary {
                @apply btn bg-secondary text-white hover:bg-secondary/90 focus:ring-secondary/50;
            }
            .btn-accent {
                @apply btn bg-accent text-white hover:bg-accent/90 focus:ring-accent/50;
            }
            .btn-outline {
                @apply btn border border-gray-300 text-gray-700 hover:bg-gray-50 focus:ring-gray-200;
            }
            .input {
                @apply w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary;
            }
            .badge {
                @apply px-2 py-1 text-xs font-medium rounded-full;
            }
            .badge-success {
                @apply badge bg-green-100 text-green-800;
            }
            .badge-danger {
                @apply badge bg-red-100 text-red-800;
            }
            .badge-warning {
                @apply badge bg-yellow-100 text-yellow-800;
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- 头部 -->
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">战绩记录器</h1>
            <p class="text-gray-600">记录你和朋友们的游戏战绩</p>
        </header>

        <!-- 主内容 -->
        <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- 左侧：玩家管理 -->
            <section class="lg:col-span-1">
                <div class="card">
                    <h2 class="text-2xl font-semibold text-gray-800 mb-4 flex items-center">
                        <i class="fa fa-users mr-2 text-primary"></i>
                        玩家管理
                    </h2>
                    <div class="mb-4">
                        <input type="text" id="playerName" placeholder="输入玩家姓名" class="input">
                    </div>
                    <button id="addPlayer" class="btn-primary w-full mb-4">
                        <i class="fa fa-plus mr-1"></i> 添加玩家
                    </button>
                    <div class="mt-4">
                        <h3 class="text-lg font-medium text-gray-700 mb-2">玩家列表</h3>
                        <ul id="playerList" class="space-y-2"></ul>
                    </div>
                    <div class="mt-6 border-t border-gray-200 pt-4">
                        <h3 class="text-lg font-medium text-gray-700 mb-3">数据管理</h3>
                        <div class="space-y-2">
                            <button id="exportData" class="btn-secondary w-full">
                                <i class="fa fa-download mr-1"></i> 导出数据
                            </button>
                            <input type="file" id="importData" accept=".json" class="hidden">
                            <button id="importDataBtn" class="btn-outline w-full">
                                <i class="fa fa-upload mr-1"></i> 导入数据
                            </button>
                            <button id="clearAllData" class="btn-outline w-full text-red-500 border-red-300 hover:bg-red-50">
                                <i class="fa fa-trash mr-1"></i> 清空所有数据
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 中间：战绩记录 -->
            <section class="lg:col-span-2">
                <div class="card">
                    <h2 class="text-2xl font-semibold text-gray-800 mb-4 flex items-center">
                        <i class="fa fa-trophy mr-2 text-primary"></i>
                        战绩记录
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">游戏类型</label>
                            <select id="gameType" class="input">
                                <option value="mahjong">麻将</option>
                                <option value="cards">扑克牌</option>
                                <option value="other">其他</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">游戏日期</label>
                            <input type="date" id="gameDate" class="input">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">参与者及得分</label>
                        <div id="participants" class="space-y-2"></div>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">备注</label>
                        <textarea id="gameNote" placeholder="添加备注信息" class="input h-20"></textarea>
                    </div>
                    <button id="addRecord" class="btn-primary w-full">
                        <i class="fa fa-save mr-1"></i> 记录战绩
                    </button>
                </div>

                <!-- 战绩列表 -->
                <div class="card mt-8">
                    <h2 class="text-2xl font-semibold text-gray-800 mb-4 flex items-center">
                        <i class="fa fa-history mr-2 text-primary"></i>
                        历史战绩
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                        <div>
                            <input type="text" id="searchInput" placeholder="搜索玩家或备注" class="input">
                        </div>
                        <div>
                            <select id="filterGameType" class="input">
                                <option value="">所有游戏类型</option>
                                <option value="mahjong">麻将</option>
                                <option value="cards">扑克牌</option>
                                <option value="other">其他</option>
                            </select>
                        </div>
                        <div>
                            <select id="filterPlayer" class="input">
                                <option value="">所有玩家</option>
                            </select>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">日期</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">游戏类型</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">参与者及得分</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">备注</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                                </tr>
                            </thead>
                            <tbody id="recordList" class="bg-white divide-y divide-gray-200"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>

        <!-- 底部统计 -->
        <section class="mt-8">
            <div class="card">
                <h2 class="text-2xl font-semibold text-gray-800 mb-4 flex items-center">
                    <i class="fa fa-bar-chart mr-2 text-primary"></i>
                    统计分析
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <div class="glass rounded-lg p-4">
                        <h3 class="text-lg font-medium text-gray-700 mb-2">总游戏次数</h3>
                        <p id="totalGames" class="text-3xl font-bold text-primary">0</p>
                    </div>
                    <div class="glass rounded-lg p-4">
                        <h3 class="text-lg font-medium text-gray-700 mb-2">总参与人数</h3>
                        <p id="totalPlayers" class="text-3xl font-bold text-secondary">0</p>
                    </div>
                    <div class="glass rounded-lg p-4">
                        <h3 class="text-lg font-medium text-gray-700 mb-2">最近游戏</h3>
                        <p id="lastGame" class="text-lg font-medium text-accent">暂无</p>
                    </div>
                </div>
                
                <!-- 玩家战绩统计 -->
                <div>
                    <h3 class="text-xl font-semibold text-gray-800 mb-3">玩家战绩</h3>
                    <div id="playerStats" class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">玩家</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">总游戏次数</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">胜利次数</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">胜利得分</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">总得分</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">平均得分</th>
                                </tr>
                            </thead>
                            <tbody id="playerStatsBody" class="bg-white divide-y divide-gray-200"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

        <!-- 页脚 -->
        <footer class="mt-8 text-center text-gray-600 text-sm">
            <p>© 2026 战绩记录器 - 记录每一次精彩瞬间</p>
        </footer>
    </div>

    <script>
        // 数据存储
        let players = JSON.parse(localStorage.getItem('players')) || [];
        let records = JSON.parse(localStorage.getItem('records')) || [];
        let editingRecordIndex = -1;

        // 初始化
        function init() {
            renderPlayers();
            renderRecords();
            updateStats();
            updatePlayerFilter();
            document.getElementById('gameDate').valueAsDate = new Date();
            
            // 事件监听
            document.getElementById('addPlayer').addEventListener('click', addPlayer);
            document.getElementById('addRecord').addEventListener('click', addOrEditRecord);
            document.getElementById('exportData').addEventListener('click', exportData);
            document.getElementById('importDataBtn').addEventListener('click', () => {
                document.getElementById('importData').click();
            });
            document.getElementById('importData').addEventListener('change', importData);
            document.getElementById('clearAllData').addEventListener('click', clearAllData);
            document.getElementById('searchInput').addEventListener('input', renderRecords);
            document.getElementById('filterGameType').addEventListener('change', renderRecords);
            document.getElementById('filterPlayer').addEventListener('change', renderRecords);
        }

        // 渲染玩家列表
        function renderPlayers() {
            const playerList = document.getElementById('playerList');
            const participants = document.getElementById('participants');
            
            // 清空列表
            playerList.innerHTML = '';
            participants.innerHTML = '';

            // 渲染玩家列表
            players.forEach((player, index) => {
                // 玩家列表项
                const li = document.createElement('li');
                li.className = 'flex items-center justify-between glass p-2 rounded-md';
                li.innerHTML = `
                    <span class="font-medium">${player.name}</span>
                    <button class="text-red-500 hover:text-red-700" onclick="removePlayer(${index})">
                        <i class="fa fa-trash"></i>
                    </button>
                `;
                playerList.appendChild(li);

                // 参与者复选框和得分输入
                const div = document.createElement('div');
                div.className = 'flex items-center space-x-2';
                div.innerHTML = `
                    <input type="checkbox" id="participant-${index}" value="${player.name}" class="mr-2">
                    <label for="participant-${index}" class="flex-1">${player.name}</label>
                    <input type="number" id="score-${index}" placeholder="得分" class="input w-24" disabled>
                `;
                participants.appendChild(div);
                
                // 添加复选框事件监听
                document.getElementById(`participant-${index}`).addEventListener('change', function() {
                    const scoreInput = document.getElementById(`score-${index}`);
                    scoreInput.disabled = !this.checked;
                    if (!this.checked) {
                        scoreInput.value = '';
                    }
                });
            });
            
            updatePlayerFilter();
        }

        // 更新玩家筛选下拉菜单
        function updatePlayerFilter() {
            const filterPlayer = document.getElementById('filterPlayer');
            filterPlayer.innerHTML = '<option value="">所有玩家</option>';
            players.forEach(player => {
                const option = document.createElement('option');
                option.value = player.name;
                option.textContent = player.name;
                filterPlayer.appendChild(option);
            });
        }

        // 渲染战绩记录
        function renderRecords() {
            const recordList = document.getElementById('recordList');
            recordList.innerHTML = '';

            // 获取筛选条件
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filterGameType = document.getElementById('filterGameType').value;
            const filterPlayerName = document.getElementById('filterPlayer').value;

            // 筛选记录
            const filteredRecords = records.filter((record, index) => {
                // 搜索筛选
                const matchesSearch = !searchTerm || 
                    record.participants.some(p => p.toLowerCase().includes(searchTerm)) ||
                    (record.note && record.note.toLowerCase().includes(searchTerm));
                
                // 游戏类型筛选
                const matchesGameType = !filterGameType || record.type === filterGameType;
                
                // 玩家筛选
                const matchesPlayer = !filterPlayerName || record.participants.includes(filterPlayerName);
                
                return matchesSearch && matchesGameType && matchesPlayer;
            });

            filteredRecords.forEach((record, displayIndex) => {
                // 找到原始索引
                const originalIndex = records.indexOf(record);
                
                // 构建参与者及得分字符串
                let participantsWithScores = '';
                record.participants.forEach((participant, i) => {
                    const score = record.scores ? record.scores[participant] || 0 : 0;
                    const scoreClass = score > 0 ? 'text-green-600 font-medium' : score < 0 ? 'text-red-600 font-medium' : 'text-gray-600';
                    participantsWithScores += `${participant} (<span class="${scoreClass}">${score}</span>)`;
                    if (i < record.participants.length - 1) {
                        participantsWithScores += ', ';
                    }
                });

                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-50';
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap">${record.date}</td>
                    <td class="px-6 py-4 whitespace-nowrap">${getGameTypeName(record.type)}</td>
                    <td class="px-6 py-4">${participantsWithScores}</td>
                    <td class="px-6 py-4">${record.note || '-'}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <button class="text-blue-500 hover:text-blue-700 mr-2" onclick="editRecord(${originalIndex})">
                            <i class="fa fa-edit"></i>
                        </button>
                        <button class="text-red-500 hover:text-red-700" onclick="removeRecord(${originalIndex})">
                            <i class="fa fa-trash"></i>
                        </button>
                    </td>
                `;
                recordList.appendChild(tr);
            });
        }

        // 编辑战绩记录
        function editRecord(index) {
            editingRecordIndex = index;
            const record = records[index];
            
            // 填充表单
            document.getElementById('gameType').value = record.type;
            document.getElementById('gameDate').value = record.date;
            document.getElementById('gameNote').value = record.note || '';
            
            // 填充参与者和得分
            players.forEach((player, i) => {
                const checkbox = document.getElementById(`participant-${i}`);
                const scoreInput = document.getElementById(`score-${i}`);
                if (checkbox && scoreInput) {
                    const isParticipant = record.participants.includes(player.name);
                    checkbox.checked = isParticipant;
                    scoreInput.disabled = !isParticipant;
                    if (isParticipant && record.scores) {
                        scoreInput.value = record.scores[player.name] || 0;
                    } else {
                        scoreInput.value = '';
                    }
                }
            });
            
            // 修改按钮文字
            document.getElementById('addRecord').innerHTML = '<i class="fa fa-save mr-1"></i> 更新战绩';
            
            // 滚动到表单
            document.querySelector('.lg\\:col-span-2').scrollIntoView({ behavior: 'smooth' });
        }

        // 添加或编辑战绩记录
        function addOrEditRecord() {
            if (editingRecordIndex >= 0) {
                // 更新现有记录
                updateRecord();
            } else {
                // 添加新记录
                addRecord();
            }
        }

        // 更新战绩记录
        function updateRecord() {
            const gameType = document.getElementById('gameType').value;
            const gameDate = document.getElementById('gameDate').value;
            const gameNote = document.getElementById('gameNote').value.trim();
            
            // 获取选中的参与者及得分
            const participants = [];
            const scores = {};
            players.forEach((player, index) => {
                const checkbox = document.getElementById(`participant-${index}`);
                if (checkbox && checkbox.checked) {
                    const scoreInput = document.getElementById(`score-${index}`);
                    const score = scoreInput.value ? parseInt(scoreInput.value) : 0;
                    participants.push(player.name);
                    scores[player.name] = score;
                }
            });

            if (participants.length > 0) {
                records[editingRecordIndex] = {
                    type: gameType,
                    date: gameDate,
                    participants: participants,
                    scores: scores,
                    note: gameNote
                };
                localStorage.setItem('records', JSON.stringify(records));
                renderRecords();
                updateStats();
                resetForm();
            }
        }

        // 重置表单
        function resetForm() {
            editingRecordIndex = -1;
            document.getElementById('gameNote').value = '';
            document.getElementById('gameDate').valueAsDate = new Date();
            document.getElementById('gameType').value = 'mahjong';
            document.getElementById('addRecord').innerHTML = '<i class="fa fa-save mr-1"></i> 记录战绩';
            
            players.forEach((player, index) => {
                const checkbox = document.getElementById(`participant-${index}`);
                const scoreInput = document.getElementById(`score-${index}`);
                if (checkbox) {
                    checkbox.checked = false;
                }
                if (scoreInput) {
                    scoreInput.value = '';
                    scoreInput.disabled = true;
                }
            });
        }

        // 更新统计信息
        function updateStats() {
            document.getElementById('totalGames').textContent = records.length;
            document.getElementById('totalPlayers').textContent = players.length;
            
            if (records.length > 0) {
                const lastRecord = records[records.length - 1];
                document.getElementById('lastGame').textContent = `${lastRecord.date} - ${getGameTypeName(lastRecord.type)}`;
            } else {
                document.getElementById('lastGame').textContent = '暂无';
            }
            
            // 更新玩家战绩统计
            updatePlayerStats();
        }
        
        // 更新玩家战绩统计
        function updatePlayerStats() {
            const playerStatsBody = document.getElementById('playerStatsBody');
            playerStatsBody.innerHTML = '';
            
            // 计算每个玩家的统计数据
            const playerStats = {};
            
            // 初始化玩家统计
            players.forEach(player => {
                playerStats[player.name] = {
                    games: 0,
                    wins: 0,
                    winScore: 0, // 胜利得分总和
                    totalScore: 0
                };
            });
            
            // 统计每个玩家的游戏次数、胜利次数和得分
            records.forEach(record => {
                record.participants.forEach(participant => {
                    if (playerStats[participant]) {
                        playerStats[participant].games++;
                        if (record.scores) {
                            const score = record.scores[participant] || 0;
                            playerStats[participant].totalScore += score;
                            // 只要得分是正数，就算胜利
                            if (score > 0) {
                                playerStats[participant].wins++;
                                playerStats[participant].winScore += score;
                            }
                        }
                    }
                });
            });
            
            // 转换为数组并按胜利得分总和排序
            const sortedPlayerStats = Object.entries(playerStats)
                .map(([name, stats]) => ({
                    name,
                    ...stats,
                    winRate: stats.games > 0 ? ((stats.wins / stats.games) * 100).toFixed(1) : 0,
                    avgScore: stats.games > 0 ? (stats.totalScore / stats.games).toFixed(2) : 0,
                    avgWinScore: stats.wins > 0 ? (stats.winScore / stats.wins).toFixed(2) : 0
                }))
                .sort((a, b) => b.winScore - a.winScore);
            
            // 渲染玩家统计表格
            sortedPlayerStats.forEach((player, index) => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-50';
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap font-medium">
                        ${index < 3 ? `<span class="inline-block w-6 h-6 rounded-full text-white text-center text-xs mr-2 ${index === 0 ? 'bg-yellow-500' : index === 1 ? 'bg-gray-400' : 'bg-yellow-700'}">${index + 1}</span>` : ''}
                        ${player.name}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">${player.games}</td>
                    <td class="px-6 py-4 whitespace-nowrap">${player.wins} (${player.winRate}%)</td>
                    <td class="px-6 py-4 whitespace-nowrap ${player.winScore > 0 ? 'text-green-600 font-medium' : 'text-gray-600'}">${player.winScore}</td>
                    <td class="px-6 py-4 whitespace-nowrap ${player.totalScore > 0 ? 'text-green-600 font-medium' : player.totalScore < 0 ? 'text-red-600 font-medium' : 'text-gray-600'}">${player.totalScore}</td>
                    <td class="px-6 py-4 whitespace-nowrap ${parseFloat(player.avgScore) > 0 ? 'text-green-600 font-medium' : parseFloat(player.avgScore) < 0 ? 'text-red-600 font-medium' : 'text-gray-600'}">${player.avgScore}</td>
                `;
                playerStatsBody.appendChild(tr);
            });
        }

        // 获取游戏类型名称
        function getGameTypeName(type) {
            const types = {
                'mahjong': '麻将',
                'cards': '扑克牌',
                'other': '其他'
            };
            return types[type] || type;
        }

        // 添加玩家
        function addPlayer() {
            const playerName = document.getElementById('playerName').value.trim();
            if (playerName) {
                players.push({ name: playerName });
                localStorage.setItem('players', JSON.stringify(players));
                document.getElementById('playerName').value = '';
                renderPlayers();
                updateStats();
            }
        }

        // 移除玩家
        function removePlayer(index) {
            players.splice(index, 1);
            localStorage.setItem('players', JSON.stringify(players));
            renderPlayers();
            updateStats();
        }

        // 添加战绩记录
        function addRecord() {
            const gameType = document.getElementById('gameType').value;
            const gameDate = document.getElementById('gameDate').value;
            const gameNote = document.getElementById('gameNote').value.trim();
            
            // 获取选中的参与者及得分
            const participants = [];
            const scores = {};
            players.forEach((player, index) => {
                const checkbox = document.getElementById(`participant-${index}`);
                if (checkbox && checkbox.checked) {
                    const scoreInput = document.getElementById(`score-${index}`);
                    const score = scoreInput.value ? parseInt(scoreInput.value) : 0;
                    participants.push(player.name);
                    scores[player.name] = score;
                }
            });

            if (participants.length > 0) {
                records.push({
                    type: gameType,
                    date: gameDate,
                    participants: participants,
                    scores: scores,
                    note: gameNote
                });
                localStorage.setItem('records', JSON.stringify(records));
                renderRecords();
                updateStats();
                resetForm();
            }
        }

        // 移除战绩记录
        function removeRecord(index) {
            if (confirm('确定要删除这条战绩记录吗？')) {
                records.splice(index, 1);
                localStorage.setItem('records', JSON.stringify(records));
                renderRecords();
                updateStats();
            }
        }

        // 导出数据
        function exportData() {
            const data = {
                players: players,
                records: records,
                exportDate: new Date().toISOString()
            };
            
            const dataStr = JSON.stringify(data, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
            const exportFileDefaultName = `战绩记录器数据_${new Date().toLocaleDateString('zh-CN')}.json`;
            
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
        }

        // 导入数据
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.players && data.records) {
                        if (confirm('确定要导入数据吗？这将覆盖当前所有数据。')) {
                            players = data.players;
                            records = data.records;
                            localStorage.setItem('players', JSON.stringify(players));
                            localStorage.setItem('records', JSON.stringify(records));
                            renderPlayers();
                            renderRecords();
                            updateStats();
                            alert('数据导入成功！');
                        }
                    } else {
                        alert('无效的数据格式！');
                    }
                } catch (error) {
                    alert('导入失败：无效的JSON文件！');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // 清空所有数据
        function clearAllData() {
            if (confirm('确定要清空所有数据吗？这将删除所有玩家和战绩记录，且无法恢复！')) {
                if (confirm('再次确认：清空所有数据？')) {
                    players = [];
                    records = [];
                    localStorage.removeItem('players');
                    localStorage.removeItem('records');
                    renderPlayers();
                    renderRecords();
                    updateStats();
                    alert('所有数据已清空！');
                }
            }
        }

        // 初始化
        init();
    </script>
</body>
</html>
